name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"  # runs daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: MohammedNabris47
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: actions/upload-artifact@v3
        with:
          name: snake
          path: dist
